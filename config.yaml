# ----------------------------------------------------------
# Frontend
# ----------------------------------------------------------
frontend:
  framework: "React 18 + Vite 5"
  styling: "Tailwind CSS 3"
  dark_mode: "class-based (tailwind darkMode: 'class')"
  theme_persistence: "localStorage key: 'theme'"
  default_theme: "dark"
  build_output: "frontend/dist/"
  dev_port: 6789

# ----------------------------------------------------------
# Data Sources
# ----------------------------------------------------------
data:
  pincodes_file: "data/pincodes.json"
  states_count: 29
  union_territories: 3                # Delhi, Chandigarh, Puducherry
  cities_count: "300+"
  pincodes_count: "2000+"

# ----------------------------------------------------------
# CSV Export
# ----------------------------------------------------------
export:
  format: "comparison"                # One row per product, platform prices as columns
  columns:
    static:
      - sr_no
      - product_name
      - brand
      - unit
      - category
      - pincode
    per_platform:                      # Repeated for each active platform
      - "{Platform}_price"
      - "{Platform}_mrp"
      - "{Platform}_stock"
    computed:
      - cheapest_platform
      - cheapest_price
      - price_diff                    # max_price - min_price
  filename_pattern: "PriceBenchmark_{pincode}_{date}.csv"

# ----------------------------------------------------------
# API Endpoints
# ----------------------------------------------------------
api:
  base_path: "/api"
  endpoints:
    - method: POST
      path: /api/scrape
      description: "Scrape products for pincodes × platforms"
      body: "{ pincodes: string[], platforms: string[], max_products_per_platform: number }"
      response: "ScrapeResponse"

    - method: GET
      path: /api/pincodes
      description: "State → City → Pincode mapping"
      response: "{ [state]: { [city]: string[] } }"

    - method: GET
      path: /api/export/csv
      description: "Download comparison CSV"
      params: "pincode (comma-separated), platforms (comma-separated)"

    - method: GET
      path: /api/categories/{platform}
      description: "Category list for a platform"

    - method: GET
      path: /api/health
      description: "Health check"
