# ============================================================
# Price Benchmark — Central Configuration
# ============================================================
# This file documents ALL configurable settings for the project.
# Runtime settings are loaded from backend/.env (see below).
# ============================================================

# ----------------------------------------------------------
# Project Info
# ----------------------------------------------------------
project:
  name: "Price Benchmark"
  version: "1.0.0"
  description: "Quick Commerce Assortment Tracker"
  port: 6789                          # Unified server port (backend + frontend)

# ----------------------------------------------------------
# Server Configuration (backend/.env)
# ----------------------------------------------------------
server:
  app_env: "development"              # development | production
  host: "0.0.0.0"
  port: 6789
  cors_origins: "http://localhost:6789"
  timeout_keep_alive: 600             # seconds — long timeout for scraping

# ----------------------------------------------------------
# Scraping Engine
# ----------------------------------------------------------
scraper:
  headless: true                      # Run Chromium in headless mode
  scrape_delay: 3                     # Delay (seconds) between requests
  max_retries: 3                      # Retry count on failures
  max_products_per_platform: 10000    # Max products to collect per platform
  scroll_times_per_category: 8        # Number of scrolls per category page
  scroll_delay: 1.0                   # Delay (seconds) between scroll events
  search_wait: 1.5                    # Wait time after page navigation
  page_timeout: 15000                 # Page load timeout (ms)
  browser_args:
    - "--disable-blink-features=AutomationControlled"
    - "--no-sandbox"
  viewport:
    width: 1366
    height: 768

# ----------------------------------------------------------
# Platforms
# ----------------------------------------------------------
platforms:
  blinkit:
    name: "Blinkit"
    base_url: "https://blinkit.com"
    color: "#F8C723"
    search_url: "/s/?q={term}"
    category_count: 65                # Hardcoded category paths
    location_method: "cookies"        # __pincode, gr_1_lat, gr_1_lng
    scrape_strategy: "categories_first + search"

  zepto:
    name: "Zepto"
    base_url: "https://www.zeptonow.com"
    color: "#8B22CF"
    search_url: "/search?query={term}"
    location_method: "cookies + localStorage + UI"
    scrape_strategy: "categories + search + __NEXT_DATA__"

  instamart:
    name: "Swiggy Instamart"
    base_url: "https://www.swiggy.com/instamart"
    color: "#FC8019"
    search_url: "/instamart/search?custom_back=true&query={term}"
    location_method: "cookies + localStorage + UI"
    scrape_strategy: "categories + search"

  jiomart:
    name: "JioMart"
    base_url: "https://www.jiomart.com"
    color: "#0078AD"
    search_url: "/search/{term}"
    location_method: "cookies + UI pincode"
    scrape_strategy: "categories + search"

  flipkart_minutes:
    name: "Flipkart Minutes"
    base_url: "https://www.flipkart.com"
    color: "#2874F0"
    search_url: "/search?q={term}&marketplace=GROCERY"
    location_method: "UI pincode"
    scrape_strategy: "search + grocery categories"

# ----------------------------------------------------------
# Search Terms (120+ grocery items)
# ----------------------------------------------------------
search_terms:
  staples:
    - rice, atta, dal, oil, sugar, salt, flour, wheat, maida, sooji
    - poha, besan, chana dal, moong dal, masoor dal, rajma, toor dal, urad dal
    - basmati rice, mustard oil, sunflower oil, refined oil, jaggery, sago
  dairy:
    - milk, curd, paneer, butter, cheese, ghee, cream, yogurt, dahi
    - lassi, buttermilk, milk powder, condensed milk
  fruits:
    - banana, apple, orange, mango, grapes, papaya, watermelon, pomegranate
    - guava, kiwi, pineapple, lemon, coconut, litchi, pear
  vegetables:
    - onion, potato, tomato, spinach, capsicum, carrot, cucumber, ginger
    - garlic, cabbage, cauliflower, brinjal, ladyfinger, peas, beans
    - mushroom, corn, beetroot, radish, pumpkin, bitter gourd, bottle gourd
    - green chilli, coriander leaves, curry leaves, mint
  snacks:
    - chips, biscuit, namkeen, cookies, chocolate, candy, cake, rusk
    - popcorn, makhana, mixture, wafer, kurkure, lays
  beverages:
    - juice, water, cold drink, cola, soda, energy drink, coconut water
  breakfast:
    - bread, maggi, noodles, oats, cornflakes, muesli, cereal, jam
    - honey, peanut butter, nutella, pasta, vermicelli
  tea_coffee:
    - tea, coffee, green tea, filter coffee, tea bags, instant coffee
  masala:
    - turmeric, chilli powder, garam masala, cumin, coriander powder, pepper
    - ketchup, sauce, mayonnaise, vinegar, pickle, papad
  non_veg:
    - egg, chicken, mutton, fish, prawn
  personal_care:
    - soap, shampoo, toothpaste, toothbrush, facewash, deodorant
    - body wash, hair oil, body lotion, razor, sanitary pad, sunscreen
  cleaning:
    - detergent, dishwash, floor cleaner, toilet cleaner, harpic, vim
    - surf excel, colin, phenyl, mop, broom
  baby_health:
    - diaper, baby food, cerelac, protein powder, vitamin, horlicks, bournvita
  kitchen:
    - tissue, aluminium foil, cling wrap, garbage bag, candle, matchbox
  frozen:
    - frozen, ice cream, pizza, burger, samosa, paratha, momos, french fries
  dry_fruits:
    - almonds, cashew, raisins, walnut, dates, peanuts, pistachio

